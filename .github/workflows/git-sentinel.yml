name: Git Sentinel Audit (Free Tier)
on:
  push:
    branches: [ main, master ]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Sufficient for a push diff

      - name: Generate GSD Sentinel Report
        run: |
          echo "### SENTINEL PUSH AUDIT: $(date)" > SENTINEL_REPORT.md
          echo "#### Changed Files:" >> SENTINEL_REPORT.md
          git diff --name-status HEAD^ HEAD >> SENTINEL_REPORT.md
          echo "#### Commit Message:" >> SENTINEL_REPORT.md
          git log -1 --pretty=%B >> SENTINEL_REPORT.md
          
      - name: Upload Sentinel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-report
          path: SENTINEL_REPORT.md